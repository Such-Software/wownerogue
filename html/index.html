    <!-- Add teletype JS implementation -->
    <script>
    // Simple teletype implementation
    (function($) {
        $.fn.teletype = function(options) {
            var settings = $.extend({
                text: [],
                typeDelay: 100,
                backDelay: 50,
                pause: 1000,
                loop: true,
                cursor: ''
            }, options);
            
            return this.each(function() {
                var $el = $(this);
                var currentTextIndex = 0;
                var currentCharIndex = 0;
                var isTyping = true;
                
                function type() {
                    var currentText = settings.text[currentTextIndex];
                    
                    if (isTyping) {
                        // Typing forward
                        if (currentCharIndex < currentText.length) {
                            $el.text($el.text() + currentText.charAt(currentCharIndex));
                            currentCharIndex++;
                            setTimeout(type, settings.typeDelay);
                        } else {
                            // Reached end of text, pause before backspacing
                            isTyping = false;
                            setTimeout(type, settings.pause);
                        }
                    } else {
                        // Backspacing
                        if (currentCharIndex > 0) {
                            $el.text($el.text().slice(0, -1));
                            currentCharIndex--;
                            setTimeout(type, settings.backDelay);
                        } else {
                            // Finished backspacing, move to next text
                            isTyping = true;
                            currentTextIndex = (currentTextIndex + 1) % settings.text.length;
                            if (currentTextIndex === 0 && !settings.loop) {
                                // Stop if we've gone through all texts and not looping
                                return;
                            }
                            setTimeout(type, settings.typeDelay);
                        }
                    }
                }
                
                // Start typing
                type();
            });
        };
    })(jQuery);
    
    // Cursor blink effect
    (function($) {
        $.fn.blink = function(options) {
            var settings = $.extend({
                text: ['|', ' '],
                delay: 500
            }, options);
            
            return this.each(function() {
                var $el = $(this);
                var currentIndex = 0;
                
                function blink() {
                    $el.text(settings.text[currentIndex]);
                    currentIndex = (currentIndex + 1) % settings.text.length;
                    setTimeout(blink, settings.delay);
                }
                
                blink();
            });
        };
    })(jQuery);
    </script>

    <script>
    $(function() {
        // Socket event listeners
        socket.on('connect', function() {
            console.log("Connected with socket ID:", socket.id);
            
            // Tell server our client ID
            socket.emit('register_client', {
                clientId: socket.id,
                userAgent: navigator.userAgent
            });
        });
        
        socket.on('welcome', function(msg) {
            $('#messages').append($('<li>').text("Connected to server!"));
            scrollChat();
        });
        
        socket.on('message', function(msg) {
            $('#messages').append($('<li>').text(msg));
            scrollChat();
        });
        
        // Critical game events
        // Replace the game_start handler with this improved version
        socket.on('game_start', function(data) {
            console.log("🎮 Received game_start broadcast:", data);
            
            // Log all socketIds for debugging
            console.log("Current socket ID:", socket.id);
            console.log("Target socket ID:", data.targetSocket);
            
            // Check if this event is for us
            const isForUs = !data.targetSocket || data.targetSocket === socket.id;
            console.log("Is this event for us?", isForUs ? "YES" : "NO");
            
            // Only process if directed at us or broadcast
            if (!isForUs) {
                console.log("Ignoring game_start message meant for another client");
                return;
            }
            
            // Check for required data
            if (!data) {
                console.error("❌ Error: Received empty game data!");
                $('#messages').append($('<li class="error">').text("Error: No game data received"));
                return;
            }
            
            // Check if we have player data
            if (!data.player || typeof data.player.x === 'undefined') {
                console.error("❌ Error: Invalid player data in game_start");
                $('#messages').append($('<li class="error">').text("Error: Invalid player data"));
                return;
            }
            
            // Track visibleTiles
            if (!data.visibleTiles) {
                console.warn("⚠️ Warning: No visibleTiles in game data, creating empty object");
                data.visibleTiles = {};
            }
            
            $('#messages').append($('<li class="game-start">').text("Starting game..."));
            
            try {
                // Display what we received
                $('#messages').append($('<li>').text(`Entering the dungeon at position (${data.player.x},${data.player.y})...`));
                
                // Start the game with received data (check if Game is available)
                if (typeof Game !== 'undefined' && Game.startGame) {
                    var success = Game.startGame(data);
                    console.log("Game start result:", success ? "SUCCESS ✅" : "FAILED ❌");
                    
                    if (!success) {
                        $('#messages').append($('<li class="error">').text("Game start failed - trying ASCII mode"));
                        
                        // Try ASCII mode as fallback
                        if (typeof Game.switchToAsciiMode === 'function') {
                            Game.switchToAsciiMode();
                            success = Game.startGame(data);
                        }
                    }
                } else {
                    console.error("Game object not available yet!");
                    // Try again in a moment
                    setTimeout(function() {
                        if (typeof Game !== 'undefined' && Game.startGame) {
                            Game.startGame(data);
                        }
                    }, 500);
                }
                
                window.focus();
            } catch (err) {
                console.error("Error starting game:", err);
                $('#messages').append($('<li class="error">').text("Error: " + err.message));
            }
            
            // Ensure chat is scrolled
            if (typeof scrollChat === 'function') {
                scrollChat();
            }
        });
        
        // Add game update handler
        socket.on('game_update', function(data) {
            console.log("🎮 Received game update:", data);
            
            // Update game state
            if (typeof Game !== 'undefined' && typeof Game.updateGameState === 'function') {
                Game.updateGameState(data);
            }
            
            // Log player position
            if (data.player) {
                console.log(`Player now at: (${data.player.x}, ${data.player.y})`);
            }
        });

        // Replace the chat form submission handler
        $('#chatForm').submit(function(e) {
            e.preventDefault();
            var msg = $('#chatInput').val().trim();
            if (msg) {
                console.log(`📝 SENDING CHAT: "${msg}"`);
                
                // Special handling for enter command
                if (msg.toLowerCase() === 'enter') {
                    console.log("🔑 'ENTER' COMMAND DETECTED - expecting game_start response");
                    $('#messages').append($('<li style="color:#ff0">').text("Requesting to enter the dungeon..."));
                }
                
                socket.emit('chat message', msg);
                $('#chatInput').val('');
            }
            return false;
        });
    });
    </script>

    <!-- Block height update script -->
    <script>
    // Function to update block height display
    function updateBlockHeight(height) {
        $('#heightValue').text(height);
    }
    
    // Listen for block updates from server
    socket.on('blockheight', function(height) {
        console.log(`📈 BLOCK HEIGHT: ${height}`);
        updateBlockHeight(height);
        $('#statusValue').text('Connected');
        $('#statusValue').css('color', '#0f0');
    });
    
    // Set a test value if no response
    setTimeout(function() {
        if ($('#heightValue').text() === 'Loading...') {
            updateBlockHeight('---');
            $('#statusValue').text('Waiting...');
            $('#statusValue').css('color', '#ff0');
        }
    }, 5000);
    </script>

    <!-- Add browser detection info -->
<div id="browser-info" style="position: fixed; right: 10px; top: 40px; background: rgba(0,0,0,0.7); color: #0f0; padding: 5px; font-family: monospace; font-size: 12px; z-index: 1000; display: none;">
    <div>Browser: <span id="browser-name">checking...</span></div>
    <div>Display: <span id="display-status">checking...</span></div>
    <button onclick="document.getElementById('browser-info').style.display='none'" style="margin-top: 5px; background: #333; border: 1px solid #666; color: white; font-size: 10px; padding: 2px 4px;">
        Close
    </button>
</div>

<script>
// Check browser and display status
$(function() {
    setTimeout(function() {
        var browserInfo = document.getElementById('browser-info');
        browserInfo.style.display = 'block';
        
        // Detect browser
        var browserName = "Unknown";
        if (navigator.userAgent.indexOf("Firefox") !== -1) {
            browserName = "Firefox";
        } else if (navigator.userAgent.indexOf("Chrome") !== -1) {
            browserName = "Chrome/Chromium";
        } else if (navigator.userAgent.indexOf("Safari") !== -1) {
            browserName = "Safari";
        } else if (navigator.userAgent.indexOf("Edge") !== -1) {
            browserName = "Edge";
        }
        
        document.getElementById('browser-name').textContent = browserName;
        
        // Check display status
        var rotdis = document.querySelector('.rotdis');
        var canvas = rotdis ? rotdis.querySelector('canvas') : null;
        
        if (canvas) {
            document.getElementById('display-status').textContent = 
                "OK (" + canvas.width + "x" + canvas.height + ")";
            document.getElementById('display-status').style.color = "#0f0";
        } else {
            document.getElementById('display-status').textContent = "NOT FOUND";
            document.getElementById('display-status').style.color = "#f00";
        }
        
        // Hide after 10 seconds
        setTimeout(function() {
            browserInfo.style.display = 'none';
        }, 10000);
    }, 2000);
});
</script>

                Game.switchToTileMode();

<!-- Enhanced socket logging wrapper -->
<script>
// Enhanced socket logging wrapper - FIXED VERSION
(function(socket) {
    // Save original emit function
    const originalEmit = socket.emit;
    
    // Override emit to log outgoing events
    socket.emit = function(event, data) {
        console.log(`📤 SOCKET EMIT: ${event}`, data);
        return originalEmit.apply(this, arguments);
    };
    
    // DON'T override the normal 'on' function - this is causing issues
    // Instead, add a listener for all events
    socket.onAny((event, ...args) => {
        console.log(`📥 SOCKET RECEIVED EVENT: ${event}`, args);
        
        // Special logging for game_start
        if (event === 'game_start') {
            const data = args[0];
            console.log("🎮 GAME START DETAILS:");
            console.log("- Player:", data && data.player ? `(${data.player.x},${data.player.y})` : "Missing");
            console.log("- VisibleTiles:", data && data.visibleTiles ? Object.keys(data.visibleTiles).length + " rows" : "Missing");
        }
    });
})(socket);

// Force refresh socket connection status
setTimeout(() => {
    console.log("Socket connection status check:", socket.connected ? "CONNECTED" : "DISCONNECTED");
    if (!socket.connected) {
        console.error("⚠️ Socket is not connected! Attempting reconnect...");
        socket.connect();
    }
}, 3000);
</script>

<!-- Add game state debugging helper -->
<script>
// Function to log current game state
function debugGameState() {
    if (!Game) {
        console.error("Game object not available");
        return;
    }
    
    console.log("🔍 GAME STATE:");
    console.log("- Active:", Game._gameActive);
    console.log("- Player:", Game._player ? 
        `(${Game._player.x},${Game._player.y})` : "Not set");
    console.log("- Monster:", Game._monster ? 
        `(${Game._monster.x},${Game._monster.y})` : "Not present");
    console.log("- Display:", Game._display ? "Initialized" : "Not initialized");
    
    // Log visible tiles count
    const visibleTileCount = Game._visibleTiles ? 
        Object.keys(Game._visibleTiles).reduce((sum, rowKey) => {
            return sum + Object.keys(Game._visibleTiles[rowKey]).length;
        }, 0) : 0;
    console.log("- Visible tiles:", visibleTileCount);
    
    // Run this every 10 seconds while game is active
    if (Game._gameActive) {
        setTimeout(debugGameState, 10000);
    }
}

// Start debug logging when game activates
const originalStartGame = Game.startGame;
Game.startGame = function(data) {
    const result = originalStartGame.call(this, data);
    if (result) {
        console.log("Game started successfully, initiating debug logging");
        debugGameState();
    }
    return result;
};
</script>

<script>
// FOV debugging helper - add at end of page
function debugClientFOV() {
  if (typeof Game === 'undefined') {
    console.error("Game not initialized");
    return;
  }
  
  console.log("🔍 CLIENT FOV DEBUG:");
  console.log("- Game active:", Game._gameActive || false);
  console.log("- Player:", Game._player ? 
              `(${Game._player.x},${Game._player.y})` : "Not set");
  
  // Check visibleTiles
  if (!Game._visibleTiles) {
    console.error("❌ NO VISIBLE TILES DATA!");
    return;
  }
  
  const rowKeys = Object.keys(Game._visibleTiles);
  console.log(`- Client has ${rowKeys.length} FOV rows`);
  
  if (rowKeys.length > 0) {
    // Sample first row
    const sampleRow = rowKeys[0];
    const cellCount = Object.keys(Game._visibleTiles[sampleRow]).length;
    console.log(`  - Sample row ${sampleRow} has ${cellCount} cells`);
    
    // Check if player is in visible tiles
    if (Game._player && Game._visibleTiles[Game._player.y] && 
        Game._visibleTiles[Game._player.y][Game._player.x] !== undefined) {
      console.log("  ✅ Player position IS in visible tiles");
    } else if (Game._player) {
      console.log(`  ❌ Player position (${Game._player.x},${Game._player.y}) NOT in visible tiles!`);
    }
  }
  
  // Draw debug visualization
  if (Game._display) {
    console.log("Drawing debug visualization of FOV data...");
    // Mark all visible tiles with a special character
    for (const y in Game._visibleTiles) {
      for (const x in Game._visibleTiles[y]) {
        Game._display.draw(parseInt(x), parseInt(y), "·", "#ff0", "#008");
      }
    }
    
    // Re-draw player on top
    if (Game._player) {
      Game._display.draw(Game._player.x, Game._player.y, "@", "#fff", "#000");
    }
  }
}

// Add keyboard shortcut: Ctrl+Shift+F
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'F') {
    console.log("FOV debug triggered by keyboard shortcut");
    debugClientFOV();
  }
});
</script>
